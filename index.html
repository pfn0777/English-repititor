<script>
// ─── 1. CONSTANTS ────────────────────────────────────────────────
const LEVEL_XP  = { A1:0, A2:200, B1:500, B2:1000, C1:2000, C2:4000 };
const LEVELS    = ['A1','A2','B1','B2','C1','C2'];
const MAX_HIST  = 20;

const MODES = {

function getUserId() {
  let id = LS.str('eb_uid');
  if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()); LS.setStr('eb_uid', id); }

// ─── 3. STORAGE HELPERS ──────────────────────────────────────────
const LS = {
  get:   k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set:   (k,v) => localStorage.setItem(k, JSON.stringify(v)),

function loadUser()  { return LS.get('eb_user'); }
function saveUser()  { LS.set('eb_user', user); }

function getVisits() { return LS.get('eb_visits') || []; }
function addVisit(d) {
  const v = getVisits();
  if (!v.includes(d)) { v.push(d); LS.set('eb_visits', v); }
}

function getModeStats() { return LS.get('eb_modes') || {}; }
function incMode(m) {
  const s = getModeStats(); s[m] = (s[m]||0)+1; LS.set('eb_modes', s);
}

function getErrors() { return LS.get('eb_errors') || []; }
function pushError(cat) {
  const e = getErrors().filter(x => x !== cat);
  e.unshift(cat); LS.set('eb_errors', e.slice(0,10));

// ─── 4. GAMIFICATION ─────────────────────────────────────────────
function updateStreak() {
  const today = todayStr();
  const yest  = dateStr(-1);
  if (user.lastVisit === today) return;
  user.streak = user.lastVisit === yest ? (user.streak||0)+1 : 1;
  user.lastVisit = today;
  addVisit(today);
  saveUser();
}

function todayStr(offset=0) {
  return new Date(Date.now() + offset*86400000).toISOString().split('T')[0];
}
function dateStr(offset) { return todayStr(offset); }

function addXP(n) {
  user.xp = (user.xp||0) + n;
  checkAchievements();
  saveUser();
  floatXP(n);
}

function floatXP(n) {
  const el = document.createElement('div');
  el.className = 'xp-float absolute text-amber-400 font-bold text-base';
  el.style.cssText = 'top:70px;right:18px;';
  el.textContent = `+${n} XP`;
  document.getElementById('xp-layer').appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function currentLevel() {
  let lv = 'A1';
  for (const [l,x] of Object.entries(LEVEL_XP)) if ((user.xp||0) >= x) lv = l;
  return lv;
}
function nextLevel() {
  const i = LEVELS.indexOf(currentLevel());
  return i < LEVELS.length-1 ? LEVELS[i+1] : null;
}
function levelPct() {
  const cur = currentLevel(), nxt = nextLevel();
  if (!nxt) return 100;
  const a = LEVEL_XP[cur], b = LEVEL_XP[nxt];
  return Math.round(((user.xp||0)-a)/(b-a)*100);
}

function checkAchievements() {
  if (!user.achievements) user.achievements = [];
  ACHIEVEMENTS.forEach(a => {
    if (!user.achievements.includes(a.id) && a.check(user)) {
      user.achievements.push(a.id);
      saveUser();
      toast(`${a.emoji} Yutuq: ${a.title}`, 'achievement');
    }
  });
}

function toast(msg, type='info') {

  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

function speakText(text) {
  if (!('speechSynthesis' in window)) { toast("Brauzeringiz audio qo'llamaydi", 'error'); return false; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.9;
  speechSynthesis.speak(u);
  return true;
}

// ─── 5. WORD PARSER ──────────────────────────────────────────────
function parseWords(text) {
  const re = /📌 \*\*(.+?)\*\*\s*(?:\((.+?)\))?\s*— (.+?)(?:\n|$)/g;
  let m, added = 0;
  if (!user.vocabulary) user.vocabulary = [];
  while ((m = re.exec(text)) !== null) {
    const word = m[1].trim(), pron = (m[2]||'').trim(), tr = m[3].trim();
    if (!user.vocabulary.find(v => v.word.toLowerCase()===word.toLowerCase())) {
      user.vocabulary.push({ word, translation:tr, pronunciation:pron, mastery:0,
        addedAt: new Date().toISOString(), nextReview: new Date().toISOString() });
      added++;
    }
  }
  if (added > 0) {
    addXP(added*5);
    toast(`📌 ${added} ta yangi so'z saqlandi!`, 'success');
  }
}

// ─── 6. TEXT RENDERER ────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function markup(s) {
  return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
}

function renderText(text) {
  const lines = text.split('\n');
  let html = '', cardBuf = [], normBuf = [];
  const CARD_STARTS = ['❌','✅','💡','🔁'];
  const isCard = l => CARD_STARTS.some(p => l.startsWith(p));

  function flushNorm() {
    const t = normBuf.join('\n').trim();
    if (t) html += `<div class="whitespace-pre-wrap leading-relaxed">${markup(t)}</div>`;
    normBuf = [];
  }
  function flushCard() {
    if (!cardBuf.length) return;
    html += `<div class="bg-amber-950 border border-amber-500 rounded-xl p-3 my-2 space-y-1 text-sm">`;
    cardBuf.forEach(l => { html += `<div>${markup(l)}</div>`; });
    html += `</div>`;
    cardBuf = [];
  }

  lines.forEach(l => {
    if (isCard(l)) { flushNorm(); cardBuf.push(l); }
    else           { flushCard(); normBuf.push(l); }
  });
  flushNorm(); flushCard();
  return html || `<div class="whitespace-pre-wrap">${markup(text)}</div>`;
}

// Extract [AUDIO]...[/AUDIO] blocks into hidden play buttons (IELTS Listening)
function renderAI(text) {
  const scripts = [];
  const stripped = text.replace(/\[AUDIO\]([\s\S]*?)\[\/AUDIO\]/g, (_, inner) => {
    scripts.push(inner.trim());
    return `\n[[AUDIO_${scripts.length-1}]]\n`;
  });
  let html = renderText(stripped);
  scripts.forEach((s, i) => {
    const btn = `<button class="aud-btn bg-indigo-600 hover:bg-indigo-500 rounded-lg px-3 py-2 text-sm my-1 inline-flex items-center gap-1" data-audio="${esc(s)}">🔊 Tinglash</button>`;
    html = html.replace(`[[AUDIO_${i}]]`, btn);
  });
  return { html, hasAudio: scripts.length > 0, firstScript: scripts[0] };
}

// ─── 7. CLAUDE API ───────────────────────────────────────────────
function onAISuccess(ai) {
  addXP(10);
  incMode(currentMode);
  if (currentMode === 'quiz')       user.quizCount       = (user.quizCount||0) + 1;
  if (currentMode === 'correction') user.correctionCount = (user.correctionCount||0) + 1;
  saveUser();
  parseWords(ai);
  if (user.goal === 'ielts') parseBand(ai);
}

function parseBand(text) {
  const m = text.match(/🎯 Band:\s*([0-9](?:\.[05])?)/);
  if (!m) return;
  if (!user.ielts) user.ielts = { targetBand: 6.5, scores: [] };
  user.ielts.scores.push({ section: currentMode, band: parseFloat(m[1]), date: todayStr() });
  if (user.ielts.scores.length > 50) user.ielts.scores = user.ielts.scores.slice(-50);
  saveUser();
}

async function callAI(userMsg, opts={}) {
  history.push({ role:'user', content: userMsg });
  if (history.length > MAX_HIST) history = history.slice(-MAX_HIST);

  try {
    const body = {
      userId: getUserId(),
      system: buildSystem(currentMode),
      messages: history,
      mode: currentMode,
      profile: { name:user.name, level:user.level, goal:user.goal },
    };
    if (opts.audio) body.audio = opts.audio;
    const res = await fetch(`${SB_URL}/functions/v1/chat`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${SB_ANON}`, 'apikey': SB_ANON },
      body: JSON.stringify(body),
    });

    const data = await res.json().catch(()=>({}));
    if (!res.ok) {
      history.pop();
      if (res.status===429) return '⏳ ' + (data.message || "Bugungi limit tugadi.");
      return `❌ ${data.message || 'Xatolik. Qayta urinib ko\'ring.'}`;
    }

    const ai = data.text || "❌ Bo'sh javob keldi.";
    history.push({ role:'assistant', content: ai });

    onAISuccess(ai);
    return ai;

  } catch(err) {
    history.pop();
    if (err.name==='TypeError') return "📡 Internet aloqasi yo'q. Qayta urinib ko'ring.";
    return `❌ Xatolik: ${err.message}`;
  }
}

let chatBusy = false;
let mediaRec = null, recChunks = [], recStream = null, recTimer = null, recSecs = 0, recStartTime = 0;
const REC_MAX_SECS = 60;

function blobToB64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

function setRecUI(on) {
  const bar = document.getElementById('ch-rec');
  const mic = document.getElementById('ch-mic');
  if (bar) bar.classList.toggle('hidden', !on);
  if (mic) {
    mic.classList.toggle('bg-red-600', on);
    mic.classList.toggle('bg-slate-700', !on);
    mic.textContent = on ? '⏹' : '🎤';
  }
}

async function toggleRec() {
  if (chatBusy && !(mediaRec && mediaRec.state === 'recording')) return;
  if (mediaRec && mediaRec.state === 'recording') { stopRec(); return; }
  if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
    return toast("Brauzeringiz ovoz yozishni qo'llamaydi", 'error');
  }
  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (_e) {
    return toast('Mikrofonga ruxsat bering', 'error');
  }
  const mime = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']
    .find(t => MediaRecorder.isTypeSupported?.(t)) || '';
  mediaRec = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
  recChunks = [];
  mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRec.onstop = onRecStop;
  mediaRec.start();
  chatBusy = true;
  recStartTime = Date.now();
  recSecs = 0;
  setRecUI(true);
  recTimer = setInterval(() => {
    recSecs++;
    const t = document.getElementById('ch-rec-t');
    if (t) t.textContent = recSecs;
    if (recSecs >= REC_MAX_SECS) stopRec();
  }, 1000);
}

function stopRec() {
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  if (mediaRec && mediaRec.state === 'recording') mediaRec.stop();
  setRecUI(false);
}

async function onRecStop() {
  recStream?.getTracks().forEach(t => t.stop());
  recStream = null;
  const type = mediaRec?.mimeType || 'audio/webm';
  const blob = new Blob(recChunks, { type });
  recChunks = [];
  if (!blob.size) return;
  if (Date.now() - recStartTime < 1000) return toast('Juda qisqa — biroz uzunroq gapiring', 'error');
  await sendAudio(blob);
}

async function sendAudio(blob) {
  const sendBtn = document.getElementById('ch-send');
  if (!sendBtn) return;
  const micBtn = document.getElementById('ch-mic');
  const url = URL.createObjectURL(blob);
  appendAudioMsg('user', url);
  chatBusy = true;
  sendBtn.disabled = true;
  micBtn.disabled = true;
  showLoader();
  let resp;
  try {
    const data = await blobToB64(blob);
    resp = await callAI('🎤 [Ovozli xabar]', { audio: { data, mimeType: blob.type || 'audio/webm' } });
  } catch (_e) {
    resp = '❌ Ovozni yuborishda xatolik.';
  }
  document.getElementById('ld')?.remove();
  chatBusy = false;
  sendBtn.disabled = false;
  micBtn.disabled = false;
  if (resp) {
    const isErr = (resp.startsWith('❌')||resp.startsWith('📡')||resp.startsWith('⏳')) && !resp.includes('Xato:');
    appendMsg('ai', resp, isErr);
  }
}

function teardownRec() {
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  recStream?.getTracks().forEach(t => t.stop());
  recStream = null;
  if (mediaRec && mediaRec.state === 'recording') {
    mediaRec.onstop = null;
    mediaRec.stop();
  }
  mediaRec = null;
  recChunks = [];
  setRecUI(false);
}

        <div class="flex justify-between items-center mb-3">
          <div class="font-semibold text-sm">IELTS band 🎯</div>
          <span class="text-slate-400 text-xs">Maqsad: ${target.toFixed(1)}</span>
        </div>
        <div class="flex items-end gap-2 mb-3">
          <div class="text-3xl font-bold ${avg!=null&&avg>=target?'text-emerald-400':'text-indigo-400'}">${avg!=null?avg.toFixed(1):'—'}</div>
          <div class="text-xs text-slate-400 mb-1">o'rtacha band${avg!=null?` (${scores.length} baho)`:''}</div>
        </div>
        ${secHtml}
      </div>`;
  }

  const vocab = (user.vocabulary||[]).slice(0,5);
  const vocabHtml = vocab.length
    ? vocab.map(v=>`<div class="flex justify-between py-2 border-b border-slate-700 text-sm">
        <span>${esc(v.word)}${v.pronunciation?` <span class="text-slate-500">(${esc(v.pronunciation)})</span>`:''} <span class="text-slate-400">— ${esc(v.translation)}</span></span>
        <span>${stars(v.mastery)}</span>
      </div>`).join('')
    : '<div class="text-slate-500 text-sm py-2">Hali so\'z saqlanmagan</div>';

  document.getElementById('app').innerHTML = `
  <div class="min-h-screen view-fade">
    <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <button id="pr-back" class="text-slate-400 hover:text-white text-xl w-8 h-8 flex items-center justify-center">←</button>
      <div class="font-semibold">Mening natijalarim 📊</div>
    </div>
    <div class="max-w-2xl mx-auto px-4 py-6 space-y-5">
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 text-center">
          <div class="text-2xl font-bold text-amber-400">${user.streak||0}</div>
          <div class="text-xs text-slate-400 mt-1">Kun ketma-ket</div>
        </div>
        <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 text-center">
          <div class="text-2xl font-bold text-indigo-400">${user.xp||0}</div>
          <div class="text-xs text-slate-400 mt-1">Jami XP</div>
        </div>
        <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 text-center">
          <div class="text-2xl font-bold text-emerald-400">${(user.vocabulary||[]).length}</div>
          <div class="text-xs text-slate-400 mt-1">So'zlar</div>
        </div>
      </div>

      ${ieltsHtml}

      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <div class="font-semibold text-sm mb-3">So'nggi 30 kun</div>
        <div class="flex flex-wrap gap-1.5">${dots}</div>
        <div class="flex gap-4 mt-3 text-xs text-slate-400">
          <span><span class="inline-block w-2.5 h-2.5 rounded-full bg-amber-400 mr-1"></span>Kirgan</span>
          <span><span class="inline-block w-2.5 h-2.5 rounded-full bg-slate-700 mr-1"></span>O'tkazgan</span>
        </div>
      </div>

      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <div class="flex justify-between text-sm mb-2">
          <span class="font-semibold">${lv}</span>
          <span class="text-slate-400">${nxt?`${LEVEL_XP[nxt]-(user.xp||0)} XP qoldi`:'Maksimal!'}</span>
        </div>
        <div class="bg-slate-700 rounded-full h-3 mb-1">
          <div class="bg-indigo-500 h-3 rounded-full" style="width:${pct}%"></div>
        </div>
        <div class="flex justify-between">${lvBarTicks}</div>
      </div>

      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <div class="font-semibold text-sm mb-3">Yutuqlar</div>
        <div class="grid grid-cols-3 gap-2">${achHtml}</div>
      </div>

      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <div class="flex justify-between items-center mb-2">
          <div class="font-semibold text-sm">So'zlar lug'ati</div>
          <button id="pr-vocab" class="text-indigo-400 text-xs hover:text-indigo-300 transition-colors">Hammasini ko'rish →</button>
        </div>
        ${vocabHtml}
      </div>
    </div>
  </div>`;

  document.getElementById('pr-back').onclick  = renderDashboard;
  document.getElementById('pr-vocab').onclick = renderVocabulary;
}

// ─── 13. VIEW: VOCABULARY ────────────────────────────────────────
function stars(n) {
  return `<span class="text-amber-400">${'★'.repeat(n)}</span><span class="text-slate-500">${'☆'.repeat(5-n)}</span>`;
}

function vocabRows(list, hasQuery=false) {
  if (!list.length) return hasQuery
    ? '<div class="text-slate-500 text-sm text-center py-6">Natija topilmadi</div>'
    : '';
  return list.map(v=>`
    <div class="bg-slate-800 rounded-xl p-3 border border-slate-700 flex items-center justify-between">
      <div>
        <div class="font-medium text-sm">${esc(v.word)}${v.pronunciation?` <span class="text-slate-500 font-normal">(${esc(v.pronunciation)})</span>`:''}</div>
        <div class="text-slate-400 text-xs mt-0.5">${esc(v.translation)}</div>
      </div>
      <div class="text-sm">${stars(v.mastery)}</div>
    </div>`).join('');
}

function renderVocabulary() {
  const vocab = user.vocabulary||[];
  document.getElementById('app').innerHTML = `
  <div class="min-h-screen view-fade">
    <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <button id="vb-back" class="text-slate-400 hover:text-white text-xl w-8 h-8 flex items-center justify-center">←</button>
      <div class="flex-1 font-semibold">So'zlar lug'ati 📚</div>
      <span class="text-slate-400 text-sm">${vocab.length} ta</span>
    </div>
    <div class="max-w-2xl mx-auto px-4 py-5">
      <input id="vb-q" type="text" placeholder="Qidirish..."
        class="w-full bg-slate-800 rounded-xl px-4 py-3 text-sm border border-slate-700 focus:border-indigo-500 focus:outline-none mb-3"/>
      ${vocab.length?`<button id="vb-rev" class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-xl py-3 font-semibold text-sm mb-4 transition-colors">
        Takrorlash ▶ (${vocab.length} so'z)</button>`:''}
      <div id="vb-list" class="space-y-2">${vocabRows(vocab)}</div>
      ${!vocab.length?`<div class="text-center py-10">
        <div class="text-4xl mb-3">📖</div>
        <div class="text-slate-400 text-sm">Hikoya yoki suhbat rejimida<br>yangi so'zlar avtomatik saqlanadi</div>
      </div>`:''}
    </div>
  </div>`;

  document.getElementById('vb-back').onclick = renderProgress;
  document.getElementById('vb-q')?.addEventListener('input', e=>{
    const q = e.target.value.toLowerCase();
    const filtered = q ? vocab.filter(v=>v.word.toLowerCase().includes(q)||v.translation.toLowerCase().includes(q)) : vocab;
    document.getElementById('vb-list').innerHTML = vocabRows(filtered, !!q);
  });
  document.getElementById('vb-rev')?.addEventListener('click', ()=>startReview(vocab));
}

// ─── 14. REVIEW MODE ─────────────────────────────────────────────
function startReview(vocab) {
  const queue = [...vocab].sort((a,b)=>a.mastery-b.mastery);
  let idx = 0;

  function showCard() {
    if (idx >= queue.length) {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-4 view-fade">
          <div class="text-center">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-xl font-bold mb-2">Takrorlash tugadi!</h2>
            <p class="text-slate-400 mb-6">${queue.length} ta so'z takrorlandi</p>
            <button id="rv-done" class="bg-indigo-600 hover:bg-indigo-500 rounded-xl px-8 py-3 font-semibold transition-colors">Lug'atga qaytish</button>
          </div>
        </div>`;
      document.getElementById('rv-done').onclick = renderVocabulary;
      return;
    }

    const item = queue[idx];
    document.getElementById('app').innerHTML = `
      <div class="min-h-screen flex flex-col view-fade">
        <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center gap-3">
          <button id="rv-exit" class="text-slate-400 hover:text-white text-xl w-8 h-8 flex items-center justify-center">←</button>
          <div class="flex-1 font-semibold">Takrorlash</div>
          <span class="text-slate-400 text-sm">${idx+1}/${queue.length}</span>
        </div>
        <div class="flex-1 flex items-center justify-center p-6">
          <div class="w-full max-w-sm">
            <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700 text-center mb-4">
              <div class="text-3xl font-bold mb-1">${esc(item.word)}</div>
              <div class="text-slate-500 text-sm">O'zbek tarjimasini kiriting</div>
            </div>
            <input id="rv-in" type="text" placeholder="Tarjima..."
              class="w-full bg-slate-700 rounded-xl px-4 py-3 text-sm border border-slate-600 focus:border-indigo-500 focus:outline-none mb-3 text-center"/>
            <button id="rv-chk" class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-xl py-3 font-semibold text-sm transition-colors">Tekshirish</button>
          </div>
        </div>
      </div>`;

    document.getElementById('rv-exit').onclick = renderVocabulary;
    const inp = document.getElementById('rv-in');
    inp.focus();

    const check = () => {
      const ans = inp.value.trim().toLowerCase();
      const cor = item.translation.toLowerCase();
      const firstToken = cor.split(' ')[0];
      const ok = ans === cor
        || (ans.length >= 2 && cor.includes(ans))
        || (firstToken.length >= 3 && ans.includes(firstToken));

      const vItem = user.vocabulary.find(v=>v.word===item.word);
      if (vItem) {
        vItem.mastery = ok ? Math.min(5,vItem.mastery+1) : Math.max(0,vItem.mastery-1);
        saveUser();
      }
      if (ok) addXP(2);

      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex flex-col view-fade">
          <div class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center">
            <div class="flex-1 font-semibold">Takrorlash</div>
            <span class="text-slate-400 text-sm">${idx+1}/${queue.length}</span>
          </div>
          <div class="flex-1 flex items-center justify-center p-6">
            <div class="w-full max-w-sm">
              <div class="${ok?'bg-emerald-950 border-emerald-500':'bg-red-950 border-red-500'} border rounded-2xl p-6 text-center mb-4">
                <div class="text-3xl mb-2">${ok?'✅':'❌'}</div>
                <div class="${ok?'text-emerald-400':'text-red-400'} font-bold mb-1">${ok?"To'g'ri!":'Noto\'g\'ri'}</div>
                <div class="text-sm text-slate-300">${esc(item.word)} — ${esc(item.translation)}</div>
                ${!ok?`<div class="text-xs text-slate-400 mt-1">Sizning javob: ${esc(inp.value)}</div>`:''}
              </div>
              <button id="rv-nxt" class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-xl py-3 font-semibold text-sm transition-colors">Keyingisi →</button>
            </div>
          </div>
        </div>`;
      document.getElementById('rv-nxt').onclick = ()=>{ idx++; showCard(); };
    };

    document.getElementById('rv-chk').onclick = check;
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') check(); });
  }

  showCard();
}

// ─── 15. APP INIT ─────────────────────────────────────────────────
function init() {
  user = loadUser();
  if (!user) { renderOnboarding(); return; }
  if (!user.ielts) user.ielts = { targetBand: 6.5, scores: [] };
  updateStreak();
  renderDashboard();
}

init();
</script>
</body>
</html>
